# Newsfeed freshness monitor — Cloudflare Worker (Cron).
# NOT deployed by this repo. Deploy + secret steps: CUTOVER-RUNBOOK.md §B.
name = "newsfeed-monitor"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Every 3 hours, out-of-band and independent of the Mac. Cloudflare free tier
# allows up to 5 cron triggers per account.
[triggers]
crons = ["0 */3 * * *"]

[vars]
# Where to read the published articles.json. `HEAD` avoids a long-lived Fastly
# cache artifact observed on the branch URL after a delayed push, while still
# resolving to the default branch.
ARTICLES_URL = "https://raw.githubusercontent.com/trymhaak/Newsfeed-generator/HEAD/data/articles.json"
STALE_HOURS = "12"
REMINDER_HOURS = "24"
WEBHOOK_KIND = "telegram"   # discord | slack | telegram

# WEBHOOK_URL is a SECRET — never commit it. Set it after deploy with:
#   wrangler secret put WEBHOOK_URL
