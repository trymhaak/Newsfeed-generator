# Newsfeed freshness monitor — Cloudflare Worker (Cron).
# NOT deployed by this repo. Deploy + secret steps: CUTOVER-RUNBOOK.md §B.
name = "newsfeed-monitor"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Every 3 hours, out-of-band and independent of the Mac. Cloudflare free tier
# allows up to 5 cron triggers per account.
[triggers]
crons = ["0 */3 * * *"]

[vars]
# Where to read the successful pipeline heartbeat. Use GitHub's contents API
# instead of raw branch URLs: raw.githubusercontent.com can serve stale
# branch-cache artifacts after a delayed push, while the API reflects the latest
# branch tip and can return the raw file body with the Accept header in index.ts.
STATUS_URL = "https://api.github.com/repos/trymhaak/Newsfeed-generator/contents/data/pipeline-status.json?ref=main"
ARTICLES_URL = "https://raw.githubusercontent.com/trymhaak/Newsfeed-generator/HEAD/data/articles.json"
STALE_HOURS = "12"
REMINDER_HOURS = "24"
WEBHOOK_KIND = "log"        # log | discord | slack | telegram

# WEBHOOK_URL is optional and only used for discord/slack/telegram sinks. Do not
# point this at Trym's Telegram directly; Hermes-owned local watchdogs poll this
# Worker and handle remediation without user-facing noise.
#   wrangler secret delete WEBHOOK_URL
#   wrangler secret put WEBHOOK_URL
