# Newsfeed CANDIDATE sources — research output, NOT yet merged.
#
# Branch: research/microsoft-sources   Generated: 2026-06-20
# Companion catalog + per-feed curl evidence:
#   docs/research/microsoft-sources-2026-06-20.md
#
# Every feed below was curl-verified on 2026-06-20 with the pipeline's browser
# User-Agent and ALL of: HTTP 200, <rss>/<feed> root (real XML), >= 10 items,
# and a recent latest-item pubDate (not a dead/dormant feed). None duplicates
# the 11 sources already in config/feeds.yaml. Schema is identical to feeds.yaml
# (id / name / url / topic / weight) so this pastes straight in.
#
# CURATION / COST NOTE: this is the full validated set (49 feeds). The live
# pipeline runs every 5 min and calls `claude` per NEW article, so merging all
# of these multiplies enrichment cost. Feeds are ordered best-first within each
# topic; enable the subset you want (or set `enabled: false` on the rest).
# Heavy/aggressive feeds are flagged inline.
#
# Tech Community URLs use the post-migration pattern
#   /t5/s/gxcuf89792/rss/board?board.id=<BoardId>
# which the existing fetch-feeds.ts already handles (browser UA + 0-items=fail).

