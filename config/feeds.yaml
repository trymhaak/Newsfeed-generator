# Newsfeed sources for the Newsfeed-generator.
#
# Schema (one entry per feed):
#   id:     stable slug used in article IDs; never change after first run
#   name:   human-readable label shown as source in UI
#   url:    RSS or Atom feed URL
#   topic:  default topic if AI can't classify confidently
#           one of: identitet | sikkerhet | endpoint | ai
#   weight: 0.0-1.0 source authority — multiplied into article score
#           Official MS sources: 0.8-1.0
#           Reputable MVPs/community: 0.6-0.8
#           Aggregators/news: 0.4-0.6
#   enabled: optional, defaults to true. Set false to temporarily disable.
#
# NOTE (2026-06-20 source repair): Microsoft Tech Community migrated off its old
# Khoros/Lithium platform; the old `/gxcuf89792/rss/board?...` URLs now 404. The
# current pattern is `/t5/s/gxcuf89792/rss/board?board.id=<BoardId>`. Two gotchas
# the fetcher handles: (1) a browser User-Agent is required or TC returns 403;
# (2) an unknown board returns HTTP 200 with a valid-but-empty "Resource Not
# Found" feed (0 items) — fetch-feeds.ts treats a 0-item feed as a failure.
# Every URL below was curl-verified 200 + valid RSS + >=10 items on 2026-06-20.

feeds:
