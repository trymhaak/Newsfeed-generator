name: Build & Deploy

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: 'Skip pipeline (build & deploy only)'
        type: boolean
        default: false
  push:
    branches: [main]

# Least-privilege default — jobs that need write override per-job.
permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  pipeline:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit refreshed articles back to main
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871  # v4.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect AI auth
        id: auth
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH" ] || [ -n "$APIKEY" ]; then
            echo "has_auth=true" >> "$GITHUB_OUTPUT"
            echo "✓ AI auth detected"
          else
            echo "has_auth=false" >> "$GITHUB_OUTPUT"
            echo "⚠ No CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY set — skipping enrichment"
          fi

      - name: Install Claude CLI
        if: ${{ inputs.skip_pipeline != true && steps.auth.outputs.has_auth == 'true' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Run pipeline
        if: ${{ inputs.skip_pipeline != true && steps.auth.outputs.has_auth == 'true' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline

      - name: Commit updated articles
        run: |
          if git diff --quiet data/ public/images 2>/dev/null; then
            echo "No new articles."
          else
            git config user.name "newsfeed-bot"
            git config user.email "newsfeed-bot@users.noreply.github.com"
            git add data/articles.json public/images 2>/dev/null || true
            git commit -m "data: refresh articles ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

  deploy:
    needs: [pipeline]
    if: always() && (needs.pipeline.result == 'success' || needs.pipeline.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # peaceiris pushes built site to gh-pages branch
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871  # v4.2.1
        with:
          ref: main

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Sanitize commit message — never interpolate untrusted GitHub context
      # directly into action inputs (script-injection risk).
      - name: Prepare commit message
        id: msg
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Take only the first line, strip any backticks/$(...) substitutions
          # by replacing them with their literal characters.
          first_line=$(printf '%s\n' "$HEAD_MSG" | head -n1)
          safe=$(printf '%s' "$first_line" | tr -d '\r' | sed 's/[`$]/_/g')
          # Bound length defensively.
          safe=${safe:0:200}
          if [ -z "$safe" ]; then
            safe="deploy site"
          fi
          {
            echo "msg<<__EOF__"
            echo "$safe"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'newsfeed-bot'
          user_email: 'newsfeed-bot@users.noreply.github.com'
          commit_message: ${{ steps.msg.outputs.msg }}
